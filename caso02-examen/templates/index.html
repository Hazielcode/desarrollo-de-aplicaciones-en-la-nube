<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE CONSULTA ONPE | HAZIELDOXEO </title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-pink: #f6019d;
            --neon-blue: #00d4ff;
            --cyber-yellow: #fcee0a;
            --dark-bg: #0d0221;
            --panel-bg: rgba(18, 4, 88, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            background-image:
                linear-gradient(rgba(18, 4, 88, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 4, 88, 0.5) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .container {
            max-width: 800px;
            margin: 100px auto;
            padding: 20px;
            position: relative;
            z-index: 5;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .sub-header {
            color: var(--neon-pink);
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .search-panel {
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            padding: 40px;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 100%, 0 100%);
        }

        .search-panel::before {
            content: "SECURE ACCESS";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--dark-bg);
            padding: 0 10px;
            color: var(--neon-blue);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            color: var(--neon-blue);
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-blue);
            padding: 15px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            box-shadow: 0 0 15px var(--neon-blue);
            border-color: #fff;
        }

        button {
            width: 100%;
            background: var(--neon-pink);
            color: #fff;
            border: none;
            padding: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: #fff;
            color: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
        }

        button::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }

        button:hover::after {
            left: 100%;
        }

        #result {
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .result-card {
            background: rgba(0, 0, 0, 0.6);
            border-left: 5px solid var(--neon-pink);
            padding: 25px;
            font-size: 1.1rem;
        }

        .result-item {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
        }

        .label {
            color: var(--neon-blue);
            text-transform: uppercase;
            font-weight: bold;
        }

        .value {
            color: var(--cyber-yellow);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: var(--neon-pink);
            color: #fff;
            font-weight: bold;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: var(--neon-blue);
        }

        .glitch-text {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {

            2%,
            64% {
                transform: translate(2px, 0) skew(0deg);
            }

            4%,
            60% {
                transform: translate(-2px, 0) skew(0deg);
            }

            62% {
                transform: translate(0, 0) skew(5deg);
            }
        }
    </style>
</head>

<body>
    <div class="scanlines"></div>

    <div class="container">
        <header>
            <h1>ONPE <span style="color: var(--neon-pink);">ACCESS</span></h1>
            <p class="sub-header">PROYECTO CASO 02 | EXAMEN </p>
        </header>

        <main class="search-panel">
            <form id="searchForm">
                <div class="input-group">
                    <label for="dni">IDENTIFICADOR (DNI)</label>
                    <input type="text" id="dni" name="dni" placeholder="XXXXXXXX" maxlength="8" required>
                </div>
                <button type="submit" id="btnSearch">INICIAR ESCANEO INDIVIDUAL</button>
            </form>

            <div style="margin-top: 15px; text-align: center;">
                <p style="color: rgba(255,255,255,0.4); margin-bottom: 10px;">— O —</p>
                <button id="btnSync" style="background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 10px;">
                    SINCRONIZAR NODO GOOGLE-SHEETS (BATCH)
                </button>
            </div>

            <div id="loading" class="loading">
                <p class="glitch-text">CONECTANDO CON EL NODO CENTRAL...</p>
            </div>

            <div id="result">
                <div class="result-card">
                    <div class="result-item">
                        <span class="label">ESTADO DE MIEMBRO:</span>
                        <span class="value" id="resMiembro"><span class="status-badge">SI</span></span>
                    </div>
                    <div class="result-item">
                        <span class="label">UBICACIÓN:</span>
                        <span class="value" id="resUbicacion">LIMA / LIMA / MIRAFLORES</span>
                    </div>
                    <div class="result-item">
                        <span class="label">LOCAL DE VOTACIÓN:</span>
                        <span class="value" id="resDireccion">CALLE LOS PINOS 456</span>
                    </div>
                    <div class="result-item" style="border: none;">
                        <span class="label">TIMESTAMP:</span>
                        <span class="value" id="resFecha" style="color: var(--neon-blue); font-size: 0.8rem;">2024-04-08
                            09:55:00</span>
                    </div>
                </div>
                <p style="margin-top: 15px; color: var(--neon-blue); font-size: 0.9rem;">* DATOS GUARDADOS EN EL ARCHIVO
                    MAESTRO EXCEL</p>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const dni = document.getElementById('dni').value;
            const btn = document.getElementById('btnSearch');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            // UI Feedback
            btn.disabled = true;
            loading.style.display = 'block';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch('/consultar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `dni=${dni}`
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('resMiembro').innerHTML = `<span class="status-badge">${data.miembro_mesa}</span>`;
                    document.getElementById('resUbicacion').innerText = data.ubicacion;
                    document.getElementById('resDireccion').innerText = data.direccion_local;
                    document.getElementById('resFecha').innerText = data.fecha_consulta;

                    setTimeout(() => {
                        loading.style.display = 'none';
                        resultDiv.style.display = 'block';
                        btn.disabled = false;
                    }, 1500);
                } else {
                    alert(data.error);
                    loading.style.display = 'none';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error(error);
                alert("ERROR DE CONEXIÓN CON EL SERVIDOR");
                loading.style.display = 'none';
                btn.disabled = false;
            }
        });

        document.getElementById('btnSync').addEventListener('click', async () => {
            const btn = document.getElementById('btnSync');
            const loading = document.getElementById('loading');
            
            if (!confirm("¿Iniciar sincronización masiva con Google Sheets?")) return;

            btn.disabled = true;
            loading.style.display = 'block';
            loading.querySelector('p').innerText = "VINCULANDO CON EL SATÉLITE GOOGLE CLOUD...";

            try {
                const response = await fetch('/sync_sheets', { method: 'POST' });
                const data = await response.json();

                if (response.ok) {
                    alert("¡ÉXITO! " + data.message);
                } else {
                    alert("ERROR: " + data.error);
                }
            } catch (error) {
                alert("FALLO CRÍTICO EN LA CONEXIÓN CLOUD");
            } finally {
                loading.style.display = 'none';
                loading.querySelector('p').innerText = "CONECTANDO CON EL NODO CENTRAL...";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
