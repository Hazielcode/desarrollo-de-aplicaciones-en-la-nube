version: '3.8'

services:
  # Base de Datos Centralizada
  db:
    image: postgres:15-alpine
    container_name: lb_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=testdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Balanceador de Carga
  nginx:
    image: nginx:alpine
    container_name: lb_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend1
      - backend2
      - backend3

  # Nodo 1
  backend1:
    build: ./backend
    container_name: backend_node_1
    environment:
      - PORT=8081
      - SERVER_ID=Backend-1 (Puerto 8081)
      - DB_HOST=db
    expose:
      - "8081"
    depends_on:
      - db
      
  # Nodo 2
  backend2:
    build: ./backend
    container_name: backend_node_2
    environment:
      - PORT=8082
      - SERVER_ID=Backend-2 (Puerto 8082)
      - DB_HOST=db
    expose:
      - "8082"
    depends_on:
      - db

  # Nodo 3
  backend3:
    build: ./backend
    container_name: backend_node_3
    environment:
      - PORT=8083
      - SERVER_ID=Backend-3 (Puerto 8083)
      - DB_HOST=db
    expose:
      - "8083"
    depends_on:
      - db

volumes:
  postgres_data:
